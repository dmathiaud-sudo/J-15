<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <title>A & D — J-15</title>
  <style>
    html, body {
      height: 100%;
      margin: 0;
      background: #ffffff;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: flex-start;
      font-family: "Segoe UI", system-ui, sans-serif;
      padding-top: 60px;
    }

    /* J-15 PLUS GRAND */
    h1 {
      font-size: 6rem; /* ← augmenté */
      color: #222;
      margin-bottom: 50px;
      letter-spacing: 0.12em;
    }

    .initials {
      font-size: 3rem;
      font-weight: bold;
      color: #e63946; /* rouge */
      margin-bottom: 20px;
    }

    .shoes {
      display: flex;
      gap: 80px;
      margin-top: 10px;
    }

    .shoe img {
      width: 140px;
      height: auto;
      object-fit: contain;
    }
  </style>
</head>
<body>

  <h1>J-15</h1>

  <div class="initials">A & D</div>

  <div class="shoes">
    <div class="shoe">
      <img src="birk.jpg" alt="Birk sous A">
    </div>
    <div class="shoe">
      <img src="havaianas.jpeg" alt="Havaianas sous D">
    </div>
  </div>

</body>
</html>
