<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <title>J-15</title>
  <style>
    html, body {
      height: 100%;
      margin: 0;
      background: #ffffff;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: flex-start;
      font-family: "Segoe UI", system-ui, sans-serif;
      padding-top: 60px;
    }

    h1 {
      font-size: 4rem;
      color: #222;
      margin-bottom: 40px;
      letter-spacing: 0.1em;
    }

    .row {
      display: flex;
      gap: 80px;
      align-items: center;
      margin-bottom: 20px;
    }

    .letter {
      font-size: 3rem;
      font-weight: bold;
      color: #333;
      text-align: center;
    }

    .shoes {
      display: flex;
      gap: 80px;
      margin-top: 10px;
    }

    .shoe img {
      width: 120px;
      height: auto;
      object-fit: contain;
    }
  </style>
</head>
<body>

  <h1>J-15</h1>

  <!-- Ligne A & D -->
  <div class="row">
    <div class="letter">A</div>
    <div class="letter">D</div>
  </div>

  <!-- Chaussures -->
  <div class="shoes">
    <div class="shoe">
      <img src="birk.jpg" alt="Birk sous A">
    </div>
    <div class="shoe">
      <img src="havaianas.jpg" alt="Havaianas sous D">
    </div>
  </div>

</body>
</html>
