<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <title>J-15 ❤️ A & D</title>
  <style>
    html, body {
      height: 100%;
      margin: 0;
      background: #ffffff;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      font-family: "Segoe UI", system-ui, sans-serif;
    }

    h1 {
      font-size: 4rem;
      color: #222;
      margin-bottom: 1.5rem;
      letter-spacing: 0.1em;
    }

    .heart-wrapper {
      position: relative;
      width: 260px;
      height: 220px;
    }

    /* Cœur rouge */
    .heart-shape {
      position: absolute;
      top: 10px;
      left: 50%;
      width: 160px;
      height: 140px;
      transform: translateX(-50%);
    }

    .heart-shape::before,
    .heart-shape::after {
      content: "";
      position: absolute;
      top: 0;
      width: 80px;
      height: 130px;
      background: #e63946;
      border-radius: 80px 80px 0 0;
      transform-origin: 0 100%;
    }

    .heart-shape::before {
      left: 0;
      transform: rotate(-45deg);
    }

    .heart-shape::after {
      left: 80px;
      transform-origin: 100% 100%;
      transform: rotate(45deg);
    }

    /* Initiales dans le cœur */
    .initials {
      position: absolute;
      top: 55px;
      left: 50%;
      transform: translateX(-50%);
      display: flex;
      gap: 40px;
      color: #ffffff;
      font-weight: bold;
      font-size: 1.6rem;
      z-index: 2;
    }

    .initials span {
      display: inline-block;
      min-width: 24px;
      text-align: center;
    }

    /* Zone chaussures dans le cœur */
    .shoes {
      position: absolute;
      bottom: 20px;
      left: 50%;
      transform: translateX(-50%);
      display: flex;
      gap: 30px;
      z-index: 2;
    }

    .shoe {
      width: 80px;
      height: 60px;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .shoe img {
      max-width: 100%;
      max-height: 100%;
      object-fit: contain;
    }
  </style>
</head>
<body>
  <h1>J-15</h1>

  <div class="heart-wrapper">
    <!-- Cœur -->
    <div class="heart-shape"></div>

    <!-- Initiales A & D -->
    <div class="initials">
      <span>A</span>
      <span>D</span>
    </div>

    <!-- Chaussures dans le cœur -->
    <div class="shoes">
      <div class="shoe">
        <!-- Remplace "birk.jpg" par le vrai nom de ton fichier -->
        <img src="birk.jpg" alt="Birk A">
      </div>
      <div class="shoe">
        <!-- Remplace "havaianas.jpg" par le vrai nom de ton fichier -->
        <img src="havaianas.jpg" alt="Tong D">
      </div>
    </div>
  </div>
</body>
</html>
